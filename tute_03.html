<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="5" cellspacing="15" cellpadding="15">
      <caption>Basic table structure</caption>
      <colgroup>
         <col span="3" style="background-color: lightyellow;">
         <col span="2" style="background-color: lightgreen;">
         
      </colgroup>
      <thead style="color: red;" align="center">
         <!-- tr: Table Row -->
         <tr>
            <th>col-1</td>
            <th>col-2</td>
            <th>col-3</td>
            <th>col-4</td>
            <th>col-5</td>
         </tr>
      </thead>
      <tbody align="center">
         <tr>
            <!-- td: Table data -->
             <td colspan="">1</td>
             <td rowspan="">2</td>
             <td>3</td>
             <td>4</td>
             <td>5</td>
         </tr>
         <tr>
            <td>6</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
            <td style="background-color: aliceblue;">10</td>
         </tr>
         <tr>
            <td>11</td>
            <td>12</td>
            <td>13</td>
            <td>14</td>
            <td>15</td>
         </tr>
      </tbody>
      <tfoot style="color: red;" align="center">
         <tr>
            <td>a</td>
            <td>b</td>
            <td>c</td>
            <td>d</td>
            <td>e</td>
         </tr>
      </tfoot>


      </table>
        
         

</body>
</html>
