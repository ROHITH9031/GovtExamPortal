<!DOCTYPE html>
<html>
<head>
    <title>Registration Form Example</title>
</head>
<body>
    <h2>Registration Form</h2>

    <form>
        <!-- Text Field -->
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <!-- Password Field -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <!-- Number Field -->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" max="100" required><br><br>

        <!-- Date of Birth Field -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>

        <!-- Phone Number Field -->
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" 
               pattern="[0-9]{10}" 
               maxlength="10" 
               required 
               placeholder="Enter 10-digit number"><br><br>

        <!-- Radio Buttons -->
        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br><br>

        <!-- Checkboxes -->
        <label>Hobbies:</label><br>
        <input type="checkbox" id="reading" name="hobbies" value="Reading">
        <label for="reading">Reading</label><br>
        <input type="checkbox" id="sports" name="hobbies" value="Sports">
        <label for="sports">Sports</label><br>
        <input type="checkbox" id="music" name="hobbies" value="Music">
        <label for="music">Music</label><br><br>

        <!-- List Box -->
        <label for="course">Select Course:</label>
        <select id="course" name="course" required>
            <option value="">--Select--</option>
            <option value="java">Java Programming</option>
            <option value="python">Python Programming</option>
            <option value="web">Web Development</option>
            <option value="db">Database Management</option>
        </select><br><br>

        <!-- Text Area -->
        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="40" required></textarea><br><br>

        <!-- Buttons -->
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
