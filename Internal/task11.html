<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Input & Output Demo</title>
  <script src="script.js"></script>
</head>
<body>
  <h1>JavaScript Input & Output Methods</h1>

  <!-- Input via form field -->
  <label>Enter your name: </label>
  <input type="text" id="nameInput">
  <button onclick="showOutput()">Submit</button>

  <!-- Output area -->
  <p id="outputArea"></p>

  <!-- Buttons for other methods -->
  <button onclick="promptExample()">Prompt Input</button>
  <button onclick="alertExample()">Alert Output</button>
  <button onclick="consoleExample()">Console Output</button>
  <button onclick="documentWriteExample()">Document Write Output</button>
</body>
</html>
