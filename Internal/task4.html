<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - Thumbnail Navigation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .thumbnail-container {
            text-align: center;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .thumbnail-container:hover {
            transform: translateY(-5px);
        }
        
        .thumbnail {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid #ddd;
            transition: border-color 0.3s ease;
        }
        
        .thumbnail:hover {
            border-color: #007bff;
        }
        
        .image-title {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }
        
        .full-image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .full-image {
            max-width: 90%;
            max-height: 90%;
            border-radius: 5px;
            box-shadow: 0 0 50px rgba(255,255,255,0.3);
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                gap: 15px;
            }
            
            .thumbnail {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <h1>Photo Gallery</h1>
    
    <div class="gallery">
        <div class="thumbnail-container">
            <a href="#modal1" onclick="openModal('images/full1.jpg', 'Mountain Landscape')">
                <img src="images/thumb1.jpg" alt="Mountain Landscape" class="thumbnail">
            </a>
            <div class="image-title">Mountain Landscape</div>
        </div>
        
        <div class="thumbnail-container">
            <a href="#modal2" onclick="openModal('images/full2.jpg', 'Ocean Sunset')">
                <img src="images/thumb2.jpg" alt="Ocean Sunset" class="thumbnail">
            </a>
            <div class="image-title">Ocean Sunset</div>
        </div>
        
        <div class="thumbnail-container">
            <a href="#modal3" onclick="openModal('images/full3.jpg', 'Forest Path')">
                <img src="images/thumb3.jpg" alt="Forest Path" class="thumbnail">
            </a>
            <div class="image-title">Forest Path</div>
        </div>
        
        <div class="thumbnail-container">
            <a href="#modal4" onclick="openModal('images/full4.jpg', 'City Skyline')">
                <img src="images/thumb4.jpg" alt="City Skyline" class="thumbnail">
            </a>
            <div class="image-title">City Skyline</div>
        </div>
        
        <div class="thumbnail-container">
            <a href="#modal5" onclick="openModal('images/full5.jpg', 'Wildflower Meadow')">
                <img src="images/thumb5.jpg" alt="Wildflower Meadow" class="thumbnail">
            </a>
            <div class="image-title">Wildflower Meadow</div>
        </div>
        
        <div class="thumbnail-container">
            <a href="#modal6" onclick="openModal('images/full6.jpg', 'Snowy Peaks')">
                <img src="images/thumb6.jpg" alt="Snowy Peaks" class="thumbnail">
            </a>
            <div class="image-title">Snowy Peaks</div>
        </div>
    </div>
    
    <!-- Full Image Modal -->
    <div id="imageModal" class="full-image-modal" onclick="closeModal()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImage" class="full-image" src="" alt="Full size image">
        <div style="color: white; text-align: center; margin-top: 20px; font-size: 24px;" id="modalTitle"></div>
    </div>
    
    <script>
        let currentModalImage = '';
        
        function openModal(imageSrc, title) {
            currentModalImage = imageSrc;
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('imageModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
        
        // Close modal when clicking outside the image
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
