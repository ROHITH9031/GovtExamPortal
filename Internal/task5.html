<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>
<body>
    <h2>Student Marks Table</h2>

    <table border="2" cellpadding="10" cellspacing="10" style="color: red;">
        <!-- Table Header -->
        <tr>
            <th rowspan="2">Student Name</th>
            <th colspan="3">Subjects</th>
        </tr>
        <tr>
            <th>Math</th>
            <th>Science</th>
            <th>English</th>
        </tr>

        <!-- Table Data -->
        <tr>
            <td>Alice</td>
            <td>85</td>
            <td>90</td>
            <td>88</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>78</td>
            <td>82</td>
            <td>80</td>
        </tr>
        <tr>
            <td>Charlie</td>
            <td>92</td>
            <td>95</td>
            <td>89</td>
        </tr>
    </table>
</body>
</html>
