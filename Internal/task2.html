<!DOCTYPE html>
<html>
<head>
    <title>Hyperlink Example</title>
</head>
<body>
    <h1>Working with Hyperlinks</h1>

    <!-- Basic hyperlink -->
    <p>
        Visit <a href="https://www.google.com">Google</a> for searching information.
    </p>

    <!-- Hyperlink opening in a new tab -->
    <p>
        Open <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a> in a new tab.
    </p>

    <!-- Hyperlink opening in the same tab -->
    <p>
        Go to <a href="https://www.microsoft.com" target="_self">Microsoft</a> in the same tab.
    </p>

    <!-- Hyperlink opening in parent frame -->
    <p>
        Check <a href="https://www.github.com" target="_parent">GitHub</a> in the parent frame.
    </p>

    <!-- Hyperlink opening in full window -->
    <p>
        Learn more at <a href="https://www.w3schools.com" target="_top">W3Schools</a>.
    </p>
</body>
</html>
