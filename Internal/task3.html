<!DOCTYPE html>
<html>
<head>
    <title>Image Hyperlink Example</title>
</head>
<body>
    <h1>My Profile and My Friend's Profile</h1>

    <!-- Your Image with hyperlink -->
    <p>
        <a href="https://www.instagram.com/atyamyashith/" target="_blank">
            <img src="https://img1.hscicdn.com/image/upload/f_auto/lsci/db/PICTURES/CMS/348100/348138.jpg" alt="My Photo" width="200" height="200">
        </a>
    </p>

    <!-- Friend's Image with hyperlink -->
    <p>
        <a href="https://in.linkedin.com/in/atyamrohith" target="_blank">
            <img src="https://img1.hscicdn.com/image/upload/f_auto/lsci/db/PICTURES/CMS/348100/348138.jpg" alt="Friend's Photo" width="200" height="200">
        </a>
    </p>
</body>
</html>
