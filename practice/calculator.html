    <title>Simple Calculator</title>
</head>
<body>
    <div class="calculator">
        <input type="text" id="dispaly">
        <div class="buttons">
            <button onclick="addToDisplay('1')">1</buttons>
            <button onclick="addToDisplay('2')">2</buttons>
            <button onclick="addToDisplay('3')">3</buttons>
            <button onclick="addToDisplay('4')">4</buttons>
            <button onclick="addToDisplay('5')">5</buttons>
            <button onclick="addToDisplay('6')">6</buttons>
            <button onclick="addToDisplay('7')">7</buttons>
            <button onclick="addToDisplay('8')">8</buttons>
            <button onclick="addToDisplay('9')">9</buttons>
            <button onclick="addToDisplay('+')">+</buttons>
            <button onclick="addToDisplay('-')">-</buttons>
            <buttononclick="addToDisplay('*')">*</buttons>
            <button onclick="addToDisplay('/')">/</buttons>
            <button onclick="addToDisplay('.')">.</buttons>
            <button onclick="calculator()">=</buttons>
            <button onclick="clear()">C</buttons>
            <button click="addToDisplay('0')">0</buttons>

        </div>
    </div>
