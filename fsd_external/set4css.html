<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .name{
            color: red;
        }
        .hex{
            color: #0000ff;
        }
        .rgb{
            color: rgb(0,128,0);
        }
        .rgba{
            color: rgba(255,0,0,.5);
        }
    </style>
</head>

<body>
    <p class="name">this uses color name</p>
    <p class="hex">this uses hex</p>
    <p class="rgb">this uses rbg values</p>
    <p class="rgba">this uses rgba values</p>
</body>
</html>
